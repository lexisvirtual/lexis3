<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexis - Painel do Licenciado</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen font-sans p-4">

    <div class="bg-white p-8 rounded-2xl shadow-lg max-w-sm w-full border-t-4 border-black">
        <h2 class="text-2xl font-bold text-gray-800 text-center mb-6">Painel de Vendas</h2>
        
        <form id="vendaForm" class="space-y-5">
            
            <!-- 1. Identificação -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Quem é você?</label>
                <select id="licenciadoId" required class="block w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-black focus:border-black text-sm">
                    <option value="" disabled selected>⏳ Buscando Licenciados...</option>
                </select>
            </div>

            <!-- 2. Produto/Curso -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Qual curso vai vender?</label>
                <select id="cursoId" required class="block w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-black focus:border-black text-sm" onchange="calcularSimulacao()">
                    <option value="" disabled selected>⏳ Buscando Produtos...</option>
                </select>
            </div>

            <!-- 3. Valor da Venda -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Preço Final Negociado (R$)</label>
                <input type="number" id="valor" required min="1" step="0.01" oninput="calcularSimulacao()" class="font-bold text-lg block w-full px-3 py-2 bg-green-50 text-green-700 border border-green-300 rounded-lg focus:outline-none focus:ring-green-500 focus:border-green-500" placeholder="Ex: 5000.00">
            </div>

            <!-- 4. Forma de Pagamento -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Forma de Pagamento Combinada</label>
                <div class="grid grid-cols-2 gap-2">
                    <label id="labelCartao" class="flex flex-col items-center justify-center p-3 rounded-lg border-2 border-gray-200 cursor-pointer hover:border-black transition-all" onclick="selecionarPagamento('CREDIT_CARD')">
                        <span class="text-xl mb-1">💳</span>
                        <span class="text-xs font-bold text-gray-700">Cartão</span>
                        <span class="text-xs text-gray-400">até 12x</span>
                        <input type="radio" name="formaPagamento" value="CREDIT_CARD" class="hidden" required>
                    </label>
                    <label id="labelPixBoleto" class="flex flex-col items-center justify-center p-3 rounded-lg border-2 border-gray-200 cursor-pointer hover:border-black transition-all" onclick="selecionarPagamento('PIX_BOLETO')">
                        <span class="text-xl mb-1">⚡</span>
                        <span class="text-xs font-bold text-gray-700">Pix / Boleto</span>
                        <span class="text-xs text-gray-400">até 3x</span>
                        <input type="radio" name="formaPagamento" value="PIX_BOLETO" class="hidden" required>
                    </label>
                </div>
            </div>

            <!-- 5. Parcelas (adapta conforme a forma selecionada) -->
            <div id="parcelasDiv" class="hidden">
                <label class="block text-sm font-bold text-gray-700 mb-1">Número máximo de parcelas</label>
                <select id="maxParcelas" class="block w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-black focus:border-black text-sm" onchange="calcularSimulacao()">
                </select>
            </div>

            <!-- 6. Simulador Dinâmico -->
            <div id="simuladorPanel" class="hidden p-4 rounded-lg bg-gray-50 border border-gray-200">
                <h4 id="simTitulo" class="text-xs font-bold text-gray-500 uppercase mb-2">Previsão</h4>
                
                <div class="space-y-1 text-sm text-gray-600">
                    <div class="flex justify-between">
                        <span>Valor Cheio</span>
                        <span id="simValor" class="font-medium">-</span>
                    </div>
                    <div class="flex justify-between text-red-500">
                        <span>Tributação (6%)</span>
                        <span id="simImposto">-</span>
                    </div>
                    <div id="linhaAsaasTaxa" class="flex justify-between text-red-500 text-xs">
                        <span id="labelAsaasTaxa">Asaas (Cartão 2,99% + 0,49)</span>
                        <span id="simAsaasTaxa">-</span>
                    </div>
                    <div id="linhaAntecipacao" class="flex justify-between text-red-500 text-xs">
                        <span id="labelAntecipacao">Asaas Antecipação</span>
                        <span id="simAsaasAntecipacao">-</span>
                    </div>
                    <div class="flex justify-between text-red-500">
                        <span>Custo Lexis Base</span>
                        <span id="simLexis">-</span>
                    </div>
                    <div class="text-[10px] text-green-600 font-bold mb-1 text-right">
                        * O sistema abaterá seu Desconto Meta automaticamente na venda
                    </div>
                    
                    <hr class="my-2 border-gray-300">
                    
                    <div class="flex justify-between font-bold text-green-700 text-lg">
                        <span>Seu Lucro Limpo</span>
                        <span id="simLucro">-</span>
                    </div>
                </div>
            </div>

            <button id="btnSubmit" type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-black hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-black transition-colors opacity-50 cursor-not-allowed" disabled>
                🔗 Aguarde Carregamento...
            </button>
        </form>

        <!-- 7. Resultado: O Link URL de Pagamento limpo -->
        <div id="resultadoPix" class="hidden mt-6 p-4 bg-green-50 border border-green-200 rounded-lg text-center">
            <h3 class="text-green-800 font-bold mb-2">🎉 Link Pronto!</h3>
            <p class="text-xs text-green-700 mb-2">Envie este link de checkout para o cliente:</p>
            <input type="text" id="linkPagamento" readonly class="w-full text-sm p-3 rounded border border-green-300 bg-white font-mono text-black mb-3 text-center" />
            <button onclick="copiarLink()" class="w-full bg-green-600 text-white font-bold py-2 rounded-lg hover:bg-green-700 text-sm">
                📋 Copiar Link de Pagamento
            </button>
        </div>
    </div>

    <script>
        // Simulador de Tabela de Preços (Carrega Dinâmico)
        const CUSTOS_LEXIS = {};

        const TAXA_IMPOSTO = 0.06; // 6% (Simples Nacional)
        const CUSTO_FIXO_ASAAS = 0.49; // R$ 0.49
        
        function getTaxaCartao(parcelas) {
            if (parcelas === 1) return 0.0249; // 2,49%
            if (parcelas >= 2 && parcelas <= 6) return 0.0259; // 2,59%
            if (parcelas >= 7 && parcelas <= 12) return 0.0279; // 2,79%
            if (parcelas >= 13) return 0.0299; // 2,99%
            return 0.0299;
        }

        // Tabela de Taxa de Antecipação por número de parcelas (aproximado, baseado no Asaas)
        const TAXA_ANTECIPACAO_POR_PARCELAS = {
            1:  0.000, 2:  0.013, 3:  0.020,
            4:  0.027, 5:  0.034, 6:  0.040,
            7:  0.048, 8:  0.055, 9:  0.062,
            10: 0.069, 11: 0.076, 12: 0.083,
        };

        // Estado de qual forma de pagamento foi selecionada
        let formaSelecionada = null;

        function selecionarPagamento(forma) {
            formaSelecionada = forma;
            const labelCartao    = document.getElementById('labelCartao');
            const labelPixBoleto = document.getElementById('labelPixBoleto');
            const parcelasDiv    = document.getElementById('parcelasDiv');
            const selParcelas    = document.getElementById('maxParcelas');

            // Rebuilds the options list based on the selected method
            if (forma === 'CREDIT_CARD') {
                labelCartao.classList.add('border-black', 'bg-gray-50');
                labelCartao.classList.remove('border-gray-200');
                labelPixBoleto.classList.remove('border-black', 'bg-gray-50');
                labelPixBoleto.classList.add('border-gray-200');
                document.querySelector('input[value="CREDIT_CARD"]').checked = true;

                // Cartão: até 12x
                selParcelas.innerHTML = '';
                for (let i = 1; i <= 12; i++) {
                    const opt = document.createElement('option');
                    opt.value = i;
                    opt.text = i === 1 ? 'À Vista (1x)' : `${i}x`;
                    if (i === 12) opt.selected = true;
                    selParcelas.appendChild(opt);
                }
            } else {
                labelPixBoleto.classList.add('border-black', 'bg-gray-50');
                labelPixBoleto.classList.remove('border-gray-200');
                labelCartao.classList.remove('border-black', 'bg-gray-50');
                labelCartao.classList.add('border-gray-200');
                document.querySelector('input[value="PIX_BOLETO"]').checked = true;

                // Pix/Boleto: até 3x
                selParcelas.innerHTML = '';
                for (let i = 1; i <= 3; i++) {
                    const opt = document.createElement('option');
                    opt.value = i;
                    opt.text = i === 1 ? 'À Vista (1x)' : `${i}x`;
                    if (i === 3) opt.selected = true;
                    selParcelas.appendChild(opt);
                }
            }

            parcelasDiv.classList.remove('hidden');
            calcularSimulacao();
        }

        // 🟢 CARREGAR VALORES AO ABRIR A TELA 🟢
        async function conectarComSheets() {
            try {
                const res = await fetch('https://api-lexis.lexis-english-account.workers.dev', { method: 'GET' });
                const dadosPlanilhas = await res.json();
                
                // Preenchendo Licenciados
                const selLic = document.getElementById('licenciadoId');
                selLic.innerHTML = '<option value="" disabled selected>Selecione seu nome</option>';
                
                dadosPlanilhas.licenciados.forEach(lic => {
                    const opt = document.createElement('option');
                    opt.value = lic.id;
                    opt.text = lic.nome;
                    selLic.appendChild(opt);
                });

                // Preenchendo Cursos
                const selCur = document.getElementById('cursoId');
                selCur.innerHTML = '<option value="" disabled selected>Selecione o Curso</option>';

                dadosPlanilhas.cursos.forEach(cur => {
                    CUSTOS_LEXIS[cur.id] = cur.custo;
                    const opt = document.createElement('option');
                    opt.value = cur.id;
                    opt.text = cur.nome;
                    selCur.appendChild(opt);
                });

                // Habilitando Botão de Venda
                const btn = document.getElementById('btnSubmit');
                btn.innerHTML = "🔗 Criar Link de Pagamento Asaas";
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                btn.disabled = false;

            } catch(e) {
                alert("Erro grave de conexão. Verifique sua internet e tente novamente.");
            }
        }
        
        conectarComSheets();

        // 🟡 SIMULADOR DE LUCRO 🟡
        function calcularSimulacao() {
            const cursoSelecionado = document.getElementById('cursoId').value;
            const valorInput       = document.getElementById('valor').value;
            const simulador        = document.getElementById('simuladorPanel');

            if (!cursoSelecionado || !CUSTOS_LEXIS[cursoSelecionado] || !valorInput || valorInput <= 0 || !formaSelecionada) {
                simulador.classList.add('hidden');
                return;
            }

            const valorVenda = parseFloat(valorInput);
            const custoCurso = CUSTOS_LEXIS[cursoSelecionado];
            const formatador = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });

            const impostoLexis = valorVenda * TAXA_IMPOSTO;
            let asaasTaxaBase = 0;
            let asaasAntecipacao = 0;
            let tituloSim = '';

            if (formaSelecionada === 'CREDIT_CARD') {
                const parcelas = parseInt(document.getElementById('maxParcelas').value);
                const taxaAtiva = getTaxaCartao(parcelas);
                
                asaasTaxaBase    = (valorVenda * taxaAtiva) + CUSTO_FIXO_ASAAS;
                asaasAntecipacao = valorVenda * (TAXA_ANTECIPACAO_POR_PARCELAS[parcelas] || 0.083);
                tituloSim = `Previsão Cartão ${parcelas}x Antecipado`;

                const taxaFormatada = (taxaAtiva * 100).toFixed(2).replace('.', ',');
                document.getElementById('labelAsaasTaxa').innerText = `Asaas Cartão (${taxaFormatada}% + 0,49)`;
                document.getElementById('labelAntecipacao').innerText = `Asaas Antecipação ${parcelas}x`;
                document.getElementById('linhaAntecipacao').classList.remove('hidden');
                document.getElementById('linhaAsaasTaxa').classList.remove('hidden');
            } else {
                // PIX / Boleto: sem taxa de juros de cartão. Taxa fixa de Boleto ~R$1,99 ou Pix ~R$1,99.
                asaasTaxaBase    = 1.99; // taxa fixa de operação
                asaasAntecipacao = 0;
                tituloSim = 'Previsão Pix / Boleto';

                document.getElementById('labelAsaasTaxa').innerText = `Taxa Operacional Asaas`;
                document.getElementById('linhaAntecipacao').classList.add('hidden');
                document.getElementById('linhaAsaasTaxa').classList.remove('hidden');
            }

            const lucroLicenciado = valorVenda - impostoLexis - asaasTaxaBase - asaasAntecipacao - custoCurso;

            document.getElementById('simTitulo').innerText = tituloSim;
            document.getElementById('simValor').innerText = formatador.format(valorVenda);
            document.getElementById('simImposto').innerText = `- ${formatador.format(impostoLexis)}`;
            document.getElementById('simAsaasTaxa').innerText = `- ${formatador.format(asaasTaxaBase)}`;
            document.getElementById('simAsaasAntecipacao').innerText = `- ${formatador.format(asaasAntecipacao)}`;
            document.getElementById('simLexis').innerText = `- ${formatador.format(custoCurso)}`;
            
            const elLucro = document.getElementById('simLucro');
            elLucro.innerText = formatador.format(lucroLicenciado);

            if (lucroLicenciado <= 0) {
                elLucro.classList.replace('text-green-700', 'text-red-600');
                elLucro.innerText = `Prejuízo: ${formatador.format(lucroLicenciado)}`;
            } else {
                elLucro.classList.replace('text-red-600', 'text-green-700');
            }

            simulador.classList.remove('hidden');
        }

        // 🔴 EFETIVAR PEDIDO 🔴
        document.getElementById('vendaForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Validação da Forma de Pagamento
            if (!formaSelecionada) {
                alert('Por favor, selecione a forma de pagamento combinada com o cliente.');
                return;
            }

            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = "⏳ Conectando com Banco Asaas...";
            btn.disabled = true;

            const parcelas = parseInt(document.getElementById('maxParcelas').value) || 1;

            const dados = {
                licenciadoId:    document.getElementById('licenciadoId').value,
                cursoId:         document.getElementById('cursoId').value,
                valorVenda:      parseFloat(document.getElementById('valor').value),
                formaPagamento:  formaSelecionada,   // CREDIT_CARD | PIX_BOLETO
                maxParcelas:     parcelas
            };

            try {
                const res = await fetch('https://api-lexis.lexis-english-account.workers.dev', {
                    method: 'POST',
                    body: JSON.stringify(dados),
                    headers: { 'Content-Type': 'application/json' }
                });

                const data = await res.json();
                
                if (data.erro) {
                    alert("Atenção, Venda Interceptada:\n" + data.erro);
                } else {
                    document.getElementById('linkPagamento').value = data.linkDePagamentoUrl;
                    document.getElementById('resultadoPix').classList.remove('hidden');
                    window.scrollTo(0, document.body.scrollHeight);
                }
                
            } catch (error) {
                alert("Erro ao comunicar com o servidor da Lexis. Tente novamente em 1 minuto.");
            } finally {
                btn.innerHTML = "🔗 Criar Link de Pagamento Asaas";
                btn.disabled = false;
            }
        });

        function copiarLink() {
            const linkField = document.getElementById('linkPagamento');
            linkField.select();
            document.execCommand('copy');
            alert('Link copiado com sucesso! Pode colar no WhatsApp do cliente.');
        }
    </script>
</body>
</html>
