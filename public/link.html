<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexis - Painel do Licenciado</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen font-sans p-4">

    <div class="bg-white p-8 rounded-2xl shadow-lg max-w-sm w-full border-t-4 border-black">
        <h2 class="text-2xl font-bold text-gray-800 text-center mb-6">Painel de Vendas</h2>
        
        <form id="vendaForm" class="space-y-5">
            
            <!-- 1. Identificação -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Quem é você?</label>
                <select id="licenciadoId" required onchange="onLicenciadoChange()" class="block w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-black focus:border-black text-sm">
                    <option value="" disabled selected>⏳ Buscando Licenciados...</option>
                </select>
            </div>

            <!-- PIN de segurança -->
            <div id="pinDiv" class="hidden">
                <label class="block text-sm font-bold text-gray-700 mb-1">🔐 Sua senha (3 dígitos)</label>
                <div class="flex gap-2">
                    <input type="password" id="pinInput" maxlength="3" inputmode="numeric" pattern="[0-9]*"
                        class="block w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-black focus:border-black text-sm tracking-widest text-center text-xl font-bold"
                        placeholder="···" oninput="verificarPin()">
                </div>
                <p id="pinErro" class="hidden mt-1 text-xs text-red-500 font-semibold">❌ Senha incorreta. Tente novamente.</p>
            </div>

            <!-- 🏆 PAINEL DE METAS LEXIS 🏆 -->
            <div id="painelMeta" class="hidden rounded-xl border border-gray-200 overflow-hidden">
                <div id="metaCabecalho" class="px-4 py-3 text-white text-sm font-bold flex justify-between items-center" style="background: linear-gradient(90deg,#1a1a2e,#16213e)">
                    <span>🏆 Metas Lexis</span>
                    <span id="metaBadge" class="px-2 py-0.5 rounded-full text-xs font-bold bg-yellow-400 text-black">Calculando...</span>
                </div>
                <div class="p-4 bg-gray-50 space-y-3">
                    <div class="flex justify-between text-sm">
                        <span class="text-gray-500">Acumulado (30 dias)</span>
                        <span id="metaAcumulado" class="font-bold text-gray-800">R$ 0,00</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-3">
                        <div id="metaBarra" class="h-3 rounded-full transition-all duration-700" style="width:0%;background:linear-gradient(90deg,#f59e0b,#d97706)"></div>
                    </div>
                    <div id="metaProximaLinha" class="flex justify-between text-xs text-gray-500">
                        <span id="metaFaltaTexto">—</span>
                        <span id="metaProximaTexto">—</span>
                    </div>
                    <div id="metaDescontoLinha" class="hidden mt-1 p-2 rounded-lg bg-green-50 border border-green-200 text-center">
                        <p class="text-xs text-green-700">Desconto ativo no Custo Lexis</p>
                        <p id="metaDescontoValor" class="text-2xl font-black text-green-600">0%</p>
                    </div>
                </div>
            </div>

            <!-- 2. Produto/Curso -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Qual curso vai vender?</label>
                <select id="cursoId" required class="block w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-black focus:border-black text-sm" onchange="calcularSimulacao()">
                    <option value="" disabled selected>⏳ Buscando Produtos...</option>
                </select>
            </div>

            <!-- 3. Valor da Venda -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Preço Final Negociado (R$)</label>
                <input type="number" id="valor" required min="1" step="0.01" oninput="calcularSimulacao()" class="font-bold text-lg block w-full px-3 py-2 bg-green-50 text-green-700 border border-green-300 rounded-lg focus:outline-none focus:ring-green-500 focus:border-green-500" placeholder="Ex: 5000.00">
            </div>

            <!-- 4. Forma de Pagamento -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Forma de Pagamento Combinada</label>
                <div class="grid grid-cols-2 gap-2">
                    <label id="labelCartao" class="flex flex-col items-center justify-center p-3 rounded-lg border-2 border-gray-200 cursor-pointer hover:border-black transition-all" onclick="selecionarPagamento('CREDIT_CARD')">
                        <span class="text-xl mb-1">💳</span>
                        <span class="text-xs font-bold text-gray-700">Cartão</span>
                        <span class="text-xs text-gray-400">até 12x</span>
                        <input type="radio" name="formaPagamento" value="CREDIT_CARD" class="hidden" required>
                    </label>
                    <label id="labelPixBoleto" class="flex flex-col items-center justify-center p-3 rounded-lg border-2 border-gray-200 cursor-pointer hover:border-black transition-all" onclick="selecionarPagamento('PIX_BOLETO')">
                        <span class="text-xl mb-1">⚡</span>
                        <span class="text-xs font-bold text-gray-700">Pix / Boleto</span>
                        <span class="text-xs text-gray-400">até 3x</span>
                        <input type="radio" name="formaPagamento" value="PIX_BOLETO" class="hidden" required>
                    </label>
                </div>
            </div>

            <!-- 5. Parcelas -->
            <div id="parcelasDiv" class="hidden">
                <label class="block text-sm font-bold text-gray-700 mb-1">Número máximo de parcelas</label>
                <select id="maxParcelas" class="block w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-black focus:border-black text-sm" onchange="calcularSimulacao()">
                </select>
            </div>

            <!-- 💰 SIMULADOR DE LUCRO 💰 -->
            <div id="simuladorPanel" class="hidden p-4 rounded-lg bg-gray-50 border border-gray-200">
                <h4 id="simTitulo" class="text-[10px] font-bold text-gray-500 uppercase mb-2">Simulação de Lucro</h4>
                <div class="space-y-1 text-sm text-gray-600">
                    <div class="flex justify-between"><span>Valor Bruto</span><span id="simValor">-</span></div>
                    <div class="flex justify-between text-red-500"><span>Imposto (6%)</span><span id="simImposto">-</span></div>
                    <div id="linhaAsaasTaxa" class="flex justify-between text-red-500 text-xs"><span id="labelAsaasTaxa">Taxa Asaas</span><span id="simAsaasTaxa">-</span></div>
                    <div id="linhaAntecipacao" class="flex justify-between text-red-500 text-xs"><span id="labelAntecipacao">Antecipação</span><span id="simAsaasAntecipacao">-</span></div>
                    <div class="flex justify-between text-red-500"><span>Custo Lexis</span><span id="simLexis">-</span></div>
                    <hr class="my-2 border-gray-300">
                    <div class="flex justify-between font-bold text-green-700 text-lg"><span>Lucro Estimado</span><span id="simLucro">-</span></div>
                </div>
            </div>

            <button id="btnSubmit" type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-black hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-black transition-colors opacity-50 cursor-not-allowed" disabled>
                🔗 Aguarde Carregamento...
            </button>
        </form>

        <!-- Resultado -->
        <div id="resultadoPix" class="hidden mt-6 p-4 bg-green-50 border border-green-200 rounded-lg text-center">
            <h3 class="text-green-800 font-bold mb-2">🎉 Link Pronto!</h3>
            <input type="text" id="linkPagamento" readonly class="w-full text-sm p-3 rounded border border-green-300 bg-white font-mono text-black mb-3 text-center" />
            <button onclick="copiarLink()" class="w-full bg-green-600 text-white font-bold py-2 rounded-lg hover:bg-green-700 text-sm">📋 Copiar Link</button>
        </div>
    </div>

    <script>
        const CUSTOS_LEXIS = {};
        let DESCONTO_META_ATUAL = 0;
        const WORKER_URL = 'https://api-lexis.lexis-english-account.workers.dev';
        const TAXA_IMPOSTO = 0.06;
        let formaSelecionada = null;

        function selecionarPagamento(forma) {
            formaSelecionada = forma;
            const parcelasDiv = document.getElementById('parcelasDiv');
            const selParcelas = document.getElementById('maxParcelas');
            selParcelas.innerHTML = '';
            const max = (forma === 'CREDIT_CARD') ? 12 : 3;
            for (let i = 1; i <= max; i++) {
                const opt = document.createElement('option'); opt.value = i; opt.text = i === 1 ? '1x (À Vista)' : `${i}x`;
                if (i === max) opt.selected = true; selParcelas.appendChild(opt);
            }
            document.getElementById('labelCartao').style.borderColor = forma === 'CREDIT_CARD' ? 'black' : '#e5e7eb';
            document.getElementById('labelPixBoleto').style.borderColor = forma === 'PIX_BOLETO' ? 'black' : '#e5e7eb';
            parcelasDiv.classList.remove('hidden');
            calcularSimulacao();
        }

        async function init() {
            try {
                const res = await fetch(WORKER_URL);
                const data = await res.json();
                const selLic = document.getElementById('licenciadoId');
                selLic.innerHTML = '<option value="" disabled selected>Selecione seu nome</option>';
                data.licenciados.forEach(l => selLic.add(new Option(l.nome, l.id)));
                
                const selCur = document.getElementById('cursoId');
                selCur.innerHTML = '<option value="" disabled selected>Selecione o Curso</option>';
                data.cursos.forEach(c => { CUSTOS_LEXIS[c.id] = c.custo; selCur.add(new Option(c.nome, c.id)); });
                
                document.getElementById('btnSubmit').innerHTML = "🔗 Criar Link de Pagamento Asaas";
            } catch(e) { console.error(e); }
        }
        init();

        function onLicenciadoChange() {
            document.getElementById('pinDiv').classList.remove('hidden');
            document.getElementById('pinInput').value = '';
            document.getElementById('painelMeta').classList.add('hidden');
            travarForm(true);
        }

        function travarForm(t) {
            document.getElementById('btnSubmit').disabled = t;
            document.getElementById('btnSubmit').style.opacity = t ? 0.5 : 1;
            document.getElementById('cursoId').disabled = t;
            document.getElementById('valor').disabled = t;
        }

        function verificarPin() {
            const pin = document.getElementById('pinInput').value;
            const pinReal = document.getElementById('licenciadoId').value;
            if (pin === pinReal) { 
                travarForm(false); 
                carregarStatusMeta(); 
            } else { 
                travarForm(true); 
            }
        }

        async function carregarStatusMeta() {
            const licId = document.getElementById('licenciadoId').value;
            document.getElementById('painelMeta').classList.remove('hidden');
            try {
                const res = await fetch(`${WORKER_URL}/status?id=${licId}`);
                const s = await res.json();
                const fmt = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });
                document.getElementById('metaAcumulado').innerText = fmt.format(s.acumulado);
                
                const barra = document.getElementById('metaBarra');
                if (s.proximaMeta) {
                    const base = s.metaAtingida || 0;
                    const prog = Math.min(100, ((s.acumulado - base) / (s.proximaMeta - base)) * 100);
                    barra.style.width = prog + '%';
                    document.getElementById('metaFaltaTexto').innerText = `Falta ${fmt.format(s.faltaParaProxima)}`;
                    document.getElementById('metaProximaTexto').innerText = `Próxima: ${s.proximoDesconto}% em ${fmt.format(s.proximaMeta)}`;
                } else { barra.style.width = '100%'; document.getElementById('metaFaltaTexto').innerText = 'Nível Máximo!'; }

                if (s.descontoAtual > 0) {
                    document.getElementById('metaBadge').innerText = `✅ ${s.descontoAtual}% Off`;
                    document.getElementById('metaDescontoValor').innerText = `${s.descontoAtual}%`;
                    document.getElementById('metaDescontoLinha').classList.remove('hidden');
                    DESCONTO_META_ATUAL = s.descontoAtual / 100;
                }
                calcularSimulacao();
            } catch(e) {}
        }

        function calcularSimulacao() {
            const cId = document.getElementById('cursoId').value;
            const vVenda = parseFloat(document.getElementById('valor').value);
            if (!cId || isNaN(vVenda) || !formaSelecionada) return;

            const sim = document.getElementById('simuladorPanel');
            sim.classList.remove('hidden');
            const fmt = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });
            
            const imposto = vVenda * TAXA_IMPOSTO;
            const custoBase = CUSTOS_LEXIS[cId];
            const custoReal = custoBase * (1 - DESCONTO_META_ATUAL);
            
            let taxaAsaas = 0; let antecip = 0;
            if (formaSelecionada === 'CREDIT_CARD') {
                const parcelas = parseInt(document.getElementById('maxParcelas').value);
                taxaAsaas = (parcelas > 12 ? vVenda * 0.0429 : vVenda * 0.0299) + (0.49 * parcelas);
                if (parcelas === 1) {
                    antecip = vVenda * 0.0115;
                } else {
                    antecip = vVenda * 0.008 * (parcelas + 1);
                }
                document.getElementById('linhaAntecipacao').classList.remove('hidden');
            } else {
                taxaAsaas = 1.99; document.getElementById('linhaAntecipacao').classList.add('hidden');
            }

            const lucro = vVenda - imposto - taxaAsaas - antecip - custoReal;
            document.getElementById('simValor').innerText = fmt.format(vVenda);
            document.getElementById('simImposto').innerText = fmt.format(imposto);
            document.getElementById('simAsaasTaxa').innerText = fmt.format(taxaAsaas);
            document.getElementById('simAsaasAntecipacao').innerText = fmt.format(antecip);
            document.getElementById('simLexis').innerText = fmt.format(custoReal);
            document.getElementById('simLucro').innerText = fmt.format(lucro);
        }

        document.getElementById('vendaForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.innerHTML = "⏳ Criando Link..."; btn.disabled = true;
            try {
                const res = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        licenciadoId: document.getElementById('licenciadoId').value,
                        cursoId: document.getElementById('cursoId').value,
                        valorVenda: parseFloat(document.getElementById('valor').value),
                        formaPagamento: formaSelecionada,
                        maxParcelas: parseInt(document.getElementById('maxParcelas').value)
                    })
                });
                const data = await res.json();
                if (data.erro) { alert(data.erro); } else {
                    document.getElementById('linkPagamento').value = data.linkDePagamentoUrl;
                    document.getElementById('resultadoPix').classList.remove('hidden');
                }
            } catch (error) { alert("Erro de rede."); } finally { btn.innerHTML = "🔗 Criar Link"; btn.disabled = false; }
        });

        function copiarLink() {
            const linkField = document.getElementById('linkPagamento');
            linkField.select(); document.execCommand('copy');
            alert('Link copiado!');
        }
    </script>
</body>
</html>
