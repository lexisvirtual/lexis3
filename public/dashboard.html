<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexis - Dashboard Financeiro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap');
        
        :root {
            --brand-gradient: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            --accent-gold: #f59e0b;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #f8fafc;
        }

        .glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .premium-shadow {
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.05);
        }

        .table-row-hover:hover {
            background-color: rgba(241, 245, 249, 0.5);
            transition: all 0.2s ease;
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Tela de Login PIN -->
    <div id="loginScreen" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900 bg-opacity-95 backdrop-blur-md transition-all duration-500">
        <div class="glass p-8 rounded-[40px] premium-shadow w-full max-w-sm text-center border-slate-700">
            <div class="w-16 h-16 rounded-2xl bg-white flex items-center justify-center text-slate-900 font-black text-3xl mx-auto mb-6 shadow-xl">L</div>
            <h2 class="text-2xl font-bold text-white mb-2 tracking-tight">Dashboard Lexis</h2>
            <p class="text-slate-400 text-sm mb-8">Digite sua senha de 3 dígitos</p>
            
            <input type="password" id="pinInput" maxlength="3" inputmode="numeric" pattern="[0-9]*"
                class="w-32 bg-slate-800 border-2 border-slate-700 rounded-2xl px-4 py-4 text-center text-3xl font-black text-white tracking-[0.5em] focus:outline-none focus:border-amber-500 transition-all mb-4"
                placeholder="···" oninput="verificarPin()">
                
            <p id="loginErro" class="hidden text-red-500 text-xs font-bold mt-2">❌ Senha incorreta</p>
        </div>
    </div>

    <!-- Header / Navbar (Escondido inicial) -->
    <header id="mainHeader" class="hidden sticky top-0 z-50 glass border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-slate-900 flex items-center justify-center text-white font-black text-xl premium-shadow">L</div>
                <h1 class="text-xl font-bold tracking-tight text-slate-900">Lexis <span class="text-slate-400 font-medium">Dashboard</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <a href="index.html" class="flex items-center gap-2 px-4 py-2 text-sm font-semibold text-slate-600 hover:text-slate-900 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    Gerador de Link
                </a>
                <button onclick="logout()" class="px-3 py-1.5 border border-slate-200 rounded-lg text-xs font-bold text-slate-400 hover:bg-red-50 hover:text-red-500 hover:border-red-200 transition-all">Sair</button>
            </div>
        </div>
    </header>

    <main id="mainContent" class="hidden max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Stats Summary -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-12">
            <div class="glass p-6 rounded-3xl premium-shadow border-l-4 border-slate-900">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1 text-[10px]">Tudo Confirmado</p>
                <h3 id="statTotalVendas" class="text-3xl font-extrabold text-slate-900">0</h3>
            </div>
            <div class="glass p-6 rounded-3xl premium-shadow border-l-4 border-green-500">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1 text-[10px]">Total Bruto (Filtro)</p>
                <h3 id="statTotalBruto" class="text-3xl font-extrabold text-slate-900">R$ 0,00</h3>
            </div>
            <div class="glass p-6 rounded-3xl premium-shadow border-l-4 border-amber-500 col-span-2">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1 text-[10px]">Busca Instantânea</p>
                <input type="text" id="searchInput" oninput="filtrarTabela()" placeholder="Digite o nome do consultor ou do curso..." class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-slate-900 transition-all">
            </div>
        </div>

        <!-- Main Content Table -->
        <div class="glass rounded-[32px] premium-shadow overflow-hidden border border-slate-200 transition-all">
            <div class="px-8 py-6 border-b border-slate-200 flex justify-between items-center bg-white">
                <h2 id="tituloBoasVindas" class="text-xl font-bold text-slate-900 tracking-tighter">Histórico Financeiro Recente</h2>
                <button onclick="carregarVendas()" class="p-2 hover:bg-slate-100 rounded-full transition-colors">
                    <svg id="refreshIcon" class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead id="tabelaCabecalho">
                        <!-- Preenchido via JS -->
                    </thead>
                    <tbody id="tabelaCorpo" class="bg-white text-xs">
                        <tr>
                            <td colspan="10" class="px-8 py-20 text-center text-slate-400 font-medium italic">
                                <div class="flex flex-col items-center gap-4">
                                    <div class="w-8 h-8 border-4 border-slate-200 border-t-slate-900 rounded-full animate-spin"></div>
                                    <span>Personalizando dashboard...</span>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <div class="px-8 py-4 bg-slate-50 border-t border-slate-200 text-[10px] text-slate-400 flex justify-between items-center font-bold uppercase tracking-widest">
                <span>Relatório Financeiro dos últimos 30 dias</span>
                <span>Asaas API Live v3</span>
            </div>
        </div>

    </main>

    <script>
        const WORKER_URL = 'https://api-lexis.lexis-english-account.workers.dev/dashboard';
        let dadosCompletos = [];
        let PIN_SESSAO = localStorage.getItem('lexis_dash_pin') || '';

        const formatadorCurrency = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });
        const formatadorData = new Intl.DateTimeFormat('pt-BR', { day: '2-digit', month: '2-digit', year: '2-digit', hour: '2-digit', minute: '2-digit' });

        function verificarPin() {
            const input = document.getElementById('pinInput');
            if (input.value.length === 3) {
                PIN_SESSAO = input.value;
                carregarVendas();
            }
        }

        function logout() {
            localStorage.removeItem('lexis_dash_pin');
            location.reload();
        }

        async function carregarVendas() {
            const icon = document.getElementById('refreshIcon');
            if (icon) icon.classList.add('animate-spin');
            document.getElementById('loginErro').classList.add('hidden');

            try {
                const res = await fetch(`${WORKER_URL}?id=${PIN_SESSAO}`);
                
                if (res.status === 401 || res.status === 403) {
                    document.getElementById('loginErro').classList.remove('hidden');
                    document.getElementById('pinInput').value = '';
                    return;
                }

                if (!res.ok) throw new Error('Erro na API');
                
                dadosCompletos = await res.json();
                
                localStorage.setItem('lexis_dash_pin', PIN_SESSAO);
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainHeader').classList.remove('hidden');
                document.getElementById('mainContent').classList.remove('hidden');

                if (dadosCompletos.length > 0) {
                    const titulo = (PIN_SESSAO === '000') ? "Visão Geral (Últimos 30 dias)" : `Vendas de ${dadosCompletos[0].consultor}`;
                    document.getElementById('tituloBoasVindas').innerText = titulo;
                } else {
                    document.getElementById('tituloBoasVindas').innerText = "Vendas nos últimos 30 dias";
                }

                renderizarTabela(dadosCompletos);
                atualizarEstatisticas(dadosCompletos);

            } catch (err) {
                console.error(err);
                if (document.getElementById('tabelaCorpo')) {
                    document.getElementById('tabelaCorpo').innerHTML = `
                        <tr><td colspan="10" class="px-8 py-20 text-center text-red-400 font-bold">❌ Falha na conexão ou venda manual não processada.</td></tr>
                    `;
                }
            } finally {
                if (icon) icon.classList.remove('animate-spin');
            }
        }

        const CellValue = (val, color = 'slate-900') => `
            <div class="text-center">
                <div class="text-[12px] font-black text-${color}">${formatadorCurrency.format(val)}</div>
            </div>
        `;

        function renderizarCabecalho() {
            const head = document.getElementById('tabelaCabecalho');
            const isMaster = PIN_SESSAO === '000';
            
            if (isMaster) {
                head.innerHTML = `
                    <tr class="bg-indigo-50 bg-opacity-30">
                        <th class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center">Data/Status</th>
                        <th class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center">Curso</th>
                        <th class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center">Aluno (Pagador)</th>
                        <th class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center">Licenciado</th>
                        <th class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center">Bruto</th>
                        <th class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center">Recibo</th>
                    </tr>`;
            } else {
                head.innerHTML = `
                    <tr class="bg-indigo-50 bg-opacity-30">
                        <th class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center">Data/Status</th>
                        <th class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center">Curso</th>
                        <th class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center">Bruto</th>
                        <th class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center text-blue-500">Lexis</th>
                        <th class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center text-red-400">Imposto</th>
                        <th class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center text-slate-500">Asaas</th>
                        <th class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center text-green-600">Lucro</th>
                        <th class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center">Recibo</th>
                    </tr>`;
            }
        }

        function renderizarTabela(vendas) {
            const corpo = document.getElementById('tabelaCorpo');
            const isMaster = PIN_SESSAO === '000';
            
            renderizarCabecalho();

            if (vendas.length === 0) {
                corpo.innerHTML = `<tr><td colspan="${isMaster?6:8}" class="px-8 py-20 text-center text-slate-400">Nenhuma venda paga encontrada nos últimos 30 dias.</td></tr>`;
                return;
            }

            corpo.innerHTML = vendas.map(v => {
                const s = v.split;
                if (isMaster) {
                    return `
                    <tr class="table-row-hover group border-b border-slate-50 transition-colors">
                        <td class="px-6 py-4 text-center">
                            <div class="font-bold text-slate-900">${formatadorData.format(new Date(v.data))}</div>
                            <div class="text-[9px] text-slate-400 font-mono tracking-tighter uppercase">${v.status}</div>
                        </td>
                        <td class="px-6 py-4 text-center">
                            <div class="font-semibold text-slate-600 uppercase text-[11px]">${v.curso}</div>
                        </td>
                        <td class="px-6 py-4 text-center">
                            <div class="font-bold text-slate-900 uppercase tracking-tight text-[11px]">${v.aluno}</div>
                        </td>
                        <td class="px-6 py-4 text-center">
                            <div class="font-medium text-slate-500 uppercase tracking-tight text-[10px]">${v.consultor}</div>
                        </td>
                        <td class="px-6 py-4 text-center">
                            ${CellValue(v.valorBruto)}
                        </td>
                        <td class="px-6 py-4 text-center">
                            ${v.recibo ? `
                                <a href="${v.recibo}" target="_blank" class="p-1.5 inline-block bg-slate-900 text-white rounded-lg hover:bg-slate-700 transition-all active:scale-90">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 0 1 .707.293l5.414 5.414a1 1 0 0 1 .293.707V19a2 2 0 0 1 -2 2z"></path></svg>
                                </a>
                            ` : ''}
                        </td>
                    </tr>`;
                } else {
                    return `
                    <tr class="table-row-hover group border-b border-slate-50 transition-colors">
                        <td class="px-6 py-4">
                            <div class="font-bold text-slate-900">${formatadorData.format(new Date(v.data))}</div>
                            <div class="text-[9px] text-slate-400 font-mono tracking-tighter uppercase">${v.status}</div>
                        </td>
                        <td class="px-6 py-4">
                            <div class="font-semibold text-slate-600">${v.curso}</div>
                        </td>
                        <td class="px-6 py-4 text-center">
                            ${CellValue(v.valorBruto)}
                        </td>
                        <td class="px-6 py-4 bg-blue-50 bg-opacity-30 text-center">
                             ${s.lexis > 0 ? CellValue(s.lexis, 'blue-600') : '<span class="text-[9px] text-slate-300">Pendente</span>'}
                        </td>
                        <td class="px-6 py-4 text-center">
                             ${s.imposto > 0 ? CellValue(s.imposto, 'red-500') : '<span class="text-[9px] text-slate-300 italic">Pendente</span>'}
                        </td>
                        <td class="px-6 py-4 text-center">
                             ${s.asaas > 0 ? CellValue(s.asaas, 'slate-500') : '<span class="text-[9px] text-slate-300 italic">Pendente</span>'}
                        </td>
                        <td class="px-6 py-4 bg-green-50 bg-opacity-30 text-center">
                             ${s.lucro > 0 ? CellValue(s.lucro, 'green-700') : '<span class="text-[9px] text-slate-400 font-bold italic">Processando...</span>'}
                        </td>
                        <td class="px-6 py-4 text-center">
                            ${v.recibo ? `
                                <a href="${v.recibo}" target="_blank" class="p-1.5 inline-block bg-slate-900 text-white rounded-lg hover:bg-slate-700 transition-all active:scale-90">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 0 1 .707.293l5.414 5.414a1 1 0 0 1 .293.707V19a2 2 0 0 1 -2 2z"></path></svg>
                                </a>
                            ` : ''}
                        </td>
                    </tr>`;
                }
            }).join('');
        }

        function atualizarEstatisticas(vendas) {
            document.getElementById('statTotalVendas').innerText = vendas.length;
            const totalBruto = vendas.reduce((acc, curr) => acc + curr.valorBruto, 0);
            document.getElementById('statTotalBruto').innerText = formatadorCurrency.format(totalBruto);
        }

        function filtrarTabela() {
            const termo = document.getElementById('searchInput').value.toLowerCase();
            const filtrados = dadosCompletos.filter(v => 
                v.consultor.toLowerCase().includes(termo) || 
                v.curso.toLowerCase().includes(termo) ||
                (v.aluno && v.aluno.toLowerCase().includes(termo))
            );
            renderizarTabela(filtrados);
            atualizarEstatisticas(filtrados);
        }

        if (PIN_SESSAO) {
            carregarVendas();
        }
    </script>
</body>
</html>
