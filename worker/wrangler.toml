name = "lexis-publisher"
main = "src/index.js"
compatibility_date = "2024-03-20"


# Vamos usar variáveis de ambiente para o Token do GitHub (segurança primeiro!)
[vars]
GITHUB_OWNER = "lexisvirtual"
GITHUB_REPO = "lexis3"
GITHUB_BRANCH = "main"
UNSPLASH_ACCESS_KEY = "qMQTTHCD80yz4EPtYQcJ4B8HS1BwZ2UMiASUPB5i2oI"
UNSPLASH_ENABLED = "true"
PIXABAY_API_KEY = "54644686-7efa1461402a91a56a1f92e8b"
PEXELS_ENABLED = "true"

# Habilitar Workers AI
[ai]
binding = "AI"

# Conectar Banco de Dados KV (Pauta)
[[kv_namespaces]]
binding = "LEXIS_PAUTA"
id = "071364560008455bad2f86d070c9f4bd"

# KV Namespaces para Sistema de Automação de Blog
[[kv_namespaces]]
binding = "LEXIS_RAW_ARTICLES"
id = "43f7c7e8fcdf46af84f3c4ee1970ae61"

[[kv_namespaces]]
binding = "LEXIS_TRIAGED_ARTICLES"
id = "1b96dbd0c3a940c0b9bf74ff0ad6d576"

[[kv_namespaces]]
binding = "LEXIS_REWRITTEN_POSTS"
id = "218ec351ca98422794378764b26897d7"

[[kv_namespaces]]
binding = "LEXIS_PUBLISHED_POSTS"
id = "6b829145766e4a95b2eb656371532ff1"

# Agendamento Automático (CRON)
# "0 9 * * *"  → Publica novo post todo dia às 09:00 UTC (06:00 BRT)
# "0 9 * * 0"  → Auditoria semanal toda DOMINGO às 09:00 UTC (06:00 BRT)
[triggers]
crons = ["0 9 * * *"]
